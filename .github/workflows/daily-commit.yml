name: Daily Auto Commit

on:
  schedule:
    - cron: "17 2 * * *"
  workflow_dispatch:

permissions:
  contents: write   # 👈 THIS FIXES THE 403 ERROR

jobs:
  auto-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Git
        run: |
          git config user.name "github-actions"
          git config user.email "24f1002263@ds.study.iitm.ac.in"

      - name: Create commit - 24f1002263@ds.study.iitm.ac.in
        run: |
          echo "Last run: $(date -u)" >> daily-log.txt
          git add daily-log.txt
          git commit -m "Daily automated commit: $(date -u)" || echo "No changes to commit"
          git push
